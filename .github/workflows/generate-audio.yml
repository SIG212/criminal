name: Generate Daily Criminal

on:
  schedule:
    - cron: '0 6 * * *'   # în fiecare zi la 06:00 UTC (08:00 România)
  workflow_dispatch:        # permite și rulare manuală din GitHub UI

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate article + audio
        run: node generate-daily.js
        env:
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
          AZURE_SPEECH_KEY:     ${{ secrets.AZURE_SPEECH_KEY }}
          AZURE_SPEECH_REGION:  ${{ secrets.AZURE_SPEECH_REGION }}

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html audio/current.mp3
          git diff --staged --quiet || git commit -m "chore: day $(date +%Y-%m-%d) [skip ci]"
          git push
